*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#367c2b;--g2:#2a6322;--gl:#e8f5e9;--g3:#f0faf0;
  --y:#ffde00;--yd:#f9a825;--yl:#fffde7;
  --bg:#f5f5f0;--card:#fff;--t:#1a1a18;--ts:#6b6b66;--tl:#9b9b96;
  --bd:#e2e2da;--bd2:#ccccc4;--r:8px;--rl:12px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
  --sidebar:220px;
}
body{font-family:var(--font);font-size:14px;color:var(--t);background:var(--bg);min-height:100vh;}

/* APP SHELL */
.app-shell{display:flex;min-height:100vh;}
.app-content{flex:1;min-width:0;margin-left:var(--sidebar);display:flex;flex-direction:column;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:#1e3a1a;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;box-shadow:2px 0 8px rgba(0,0,0,.15);}
.sb-logo{padding:18px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-jd{background:var(--y);color:#1a3a0a;font-weight:700;font-size:13px;padding:4px 9px;border-radius:5px;flex-shrink:0;}
.sb-brand{color:#fff;font-size:13px;font-weight:600;line-height:1.2;}
.sb-brand span{display:block;font-size:11px;font-weight:400;opacity:.6;}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-btn{background:none;border:none;color:rgba(255,255,255,.65);font-size:13px;padding:9px 10px;cursor:pointer;border-radius:var(--r);font-weight:500;display:flex;align-items:center;gap:10px;width:100%;text-align:left;transition:all .15s;font-family:var(--font);position:relative;}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-btn.active{background:var(--g);color:#fff;box-shadow:0 2px 8px rgba(54,124,43,.4);}
.sb-btn i{font-size:16px;flex-shrink:0;width:18px;text-align:center;}
.sb-badge{background:#ff6d00;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:auto;}
.sb-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:12px;display:flex;align-items:center;gap:8px;}
.sb-user i{font-size:18px;}

/* TOPBAR INTERNA */
.page-header{padding:16px 24px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.page-title{font-size:20px;font-weight:600;color:var(--t);}
.page-sub{font-size:13px;color:var(--ts);margin-top:2px;}

/* MAIN CONTENT */
.main{padding:0 24px 24px;}
.bc{font-size:12px;color:var(--ts);padding:8px 24px;background:#eaeae4;border-bottom:1px solid var(--bd);}
.bc-link{color:var(--g);cursor:pointer;}
.bc-link:hover{text-decoration:underline;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card:hover{box-shadow:var(--shadow-md);}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;box-shadow:var(--shadow);transition:all .15s;}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;}
.stat-n{font-size:28px;font-weight:700;line-height:1;}
.stat-l{font-size:12px;color:var(--ts);margin-top:3px;}
.stat-sub{font-size:11px;margin-top:5px;font-weight:500;}

/* ITEMS */
.item{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.item:hover{border-color:var(--g);box-shadow:0 3px 12px rgba(54,124,43,.12);transform:translateY(-1px);}
.item-nc{cursor:default;}.item-nc:hover{border-color:var(--bd);box-shadow:var(--shadow);transform:none;}
.inum{color:var(--g);font-weight:600;font-size:13px;}

/* MISC */
.layout{display:flex;gap:0;}
.main-col{flex:1;min-width:0;padding:0 24px 24px;}
.side{width:230px;padding:16px;border-left:1px solid var(--bd);background:var(--card);flex-shrink:0;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.ptitle{font-size:18px;font-weight:600;}
.ptitle.mono{font-family:var(--mono);font-size:14px;}
.btn{padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;line-height:1;font-family:var(--font);transition:all .15s;}
.btn-g{background:var(--g);color:#fff;}.btn-g:hover{background:var(--g2);}
.btn-y{background:var(--y);color:#1a3a0a;border-color:var(--yd);}.btn-y:hover{background:#f0d000;}
.btn-o{background:#fff;border:1px solid var(--bd2);color:var(--t);}.btn-o:hover{border-color:var(--g);color:var(--g);background:var(--gl);}
.btn-red{background:#fce8e8;border:1px solid #ef9a9a;color:#791f1f;}
.btn-sm{padding:4px 10px;font-size:12px;}.btn-xs{padding:2px 7px;font-size:11px;}
.ct{font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:5px 15px;}
.ig3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px 9px;}
.ir{font-size:13px;display:flex;gap:5px;align-items:baseline;}
.il{color:var(--ts);min-width:78px;flex-shrink:0;font-size:12px;}
.iv{font-weight:500;}
.vrow{display:flex;gap:7px;margin-top:10px;}
.vbox{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;}
.vl{font-size:11px;color:var(--ts);margin-bottom:2px;}
.vn{font-size:15px;font-weight:700;}
.vn-g{color:var(--g2);}.vn-a{color:#854f0b;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.tg{background:#e8f5e9;color:#2a6322;}.ty{background:#fff8e1;color:#7a5f00;}
.tr{background:#fce8e8;color:#791f1f;}.tgr{background:#f0f0ea;color:#5a5a56;}
.tb-blue{background:#e3f2fd;color:#0d47a1;}.tb{background:#e3f2fd;color:#0d47a1;}
.badge{background:var(--g);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:5px;}
.badge-o{background:#ff6d00;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:5px;}
.sdiv{margin-bottom:12px;}.sdiv-t{font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}.sdiv-v{font-size:13px;margin-bottom:2px;}
.hr{height:1px;background:var(--bd);margin:10px 0;}
.remb{background:var(--yl);border:1px solid var(--yd);border-radius:var(--r);padding:10px;text-align:center;margin-bottom:10px;}
.remb-v{font-size:17px;font-weight:700;color:#412402;}
.fcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px 13px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px 13px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-size:11px;color:var(--ts);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.ff p{font-size:13px;font-weight:500;}
.tb-lbl{font-size:12px;font-weight:600;display:block;margin-bottom:3px;margin-top:9px;color:var(--t);}
.tb-p{font-size:13px;color:var(--ts);line-height:1.7;background:#f8f8f4;border-radius:var(--r);padding:7px 10px;}
.fw{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;max-width:880px;box-shadow:var(--shadow);}
.fwh{background:var(--g);color:#fff;padding:13px 17px;display:flex;justify-content:space-between;align-items:center;}
.fwh h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;}
.fwb{padding:20px;}
.fsec{margin-bottom:16px;}
.fst{font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:12px;color:var(--ts);font-weight:500;}
.fld input,.fld select,.fld textarea{padding:7px 10px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;background:#fff;color:var(--t);font-family:var(--font);outline:none;transition:border-color .15s;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(54,124,43,.08);}
.fld textarea{min-height:60px;resize:vertical;}
.empty-state{text-align:center;padding:40px 20px;color:var(--ts);}
.empty-state i{font-size:40px;color:#c8e6c9;display:block;margin:0 auto 10px;}
.alert-y{background:#fff8e1;border:1px solid var(--yd);border-radius:var(--r);padding:8px 12px;font-size:13px;color:#7a5f00;margin-bottom:8px;}
.alert-g{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:var(--r);padding:8px 12px;font-size:13px;color:#2a6322;margin-bottom:8px;}
.sb-search{display:flex;gap:8px;margin-bottom:16px;}

.sb-search input:focus{border-color:var(--g);}
.pc-item{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow);}

.upload-zone{border:2px dashed var(--bd2);border-radius:var(--rl);padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;background:#fafaf6;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--g);background:var(--gl);}
.resultado-ia{background:#fff;border:2px solid var(--g);border-radius:var(--rl);padding:18px;margin-top:14px;box-shadow:var(--shadow-md);}
.sec-titulo{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tl);margin-bottom:5px;margin-top:12px;}

.res-textarea:focus{border-color:var(--g);outline:none;}
.cort-item{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:9px;box-shadow:var(--shadow);}
.cort-item.ag{border-left:4px solid var(--yd);}

.cort-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}

.cort-acoes{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}

.cort-field .lbl{color:var(--ts);font-size:11px;display:block;margin-bottom:2px;}

.igrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px 9px;margin-top:5px;}
.if{font-size:12px;color:var(--ts);}.if b{color:var(--t);font-weight:500;}

.imp-drop:hover,.imp-drop.drag{background:var(--gl);}
.spinning{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.loading-box{background:var(--gl);border:1px solid #a5d6a7;border-radius:var(--rl);padding:20px;text-align:center;color:var(--g2);margin-top:14px;}

.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-g{background:#4caf50;}.dot-y{background:#ff9800;}.dot-r{background:#f44336;}
/* TIMELINE */
.timeline{border-left:2px solid var(--bd);padding-left:16px;margin-left:8px;}
.tl-item{position:relative;padding-bottom:14px;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--g);border:2px solid #fff;box-shadow:0 0 0 2px var(--g);position:absolute;left:-21px;top:3px;}
.tl-date{font-size:11px;color:var(--tl);margin-bottom:2px;}
.tl-title{font-size:13px;font-weight:500;}

.modal{background:#fff;border-radius:var(--rl);width:min(720px,96vw);max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-md);}

.modal-body{padding:18px;}

async function callClaude(body){
  try{
    const messages = [];
    if(body.system) messages.push({role:'system', content: body.system});
    for(const msg of (body.messages||[])){
      const role = msg.role==='assistant'?'assistant':'user';
      if(Array.isArray(msg.content)){
        const parts = [];
        for(const c of msg.content){
          if(c.type==='text') parts.push({type:'text',text:c.text});

        }
        messages.push({role, content: parts});
      } else {
        messages.push({role, content: msg.content});
      }
    }
    const resp = await fetch(OPENAI_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},
      body: JSON.stringify({model:'gpt-4o',messages,max_tokens:body.max_tokens||2000,temperature:0.3})
    });

    if(data.error) return {json:async()=>({error:{message:data.error.message},content:null}),ok:false};
    const text = data.choices?.[0]?.message?.content||'';
    return {json:async()=>({content:[{type:'text',text}]}),ok:true};
  }catch(e){
    return {json:async()=>({error:{message:'OpenAI erro: '+e.message},content:null}),ok:false};
  }
}

  {c:'AA79523',m:'DB',h:'1H POR CORREIA',n:'54992',d:'2026-01-16 00:00:00',rc:'FORAM IDENTIFICADAS FALHAS RECORRENTES NAS TRANSPORTADORAS DE SEMENTES, CARACTERIZADAS POR DESGASTE PREMATURO E ROMPIMENTO DAS CORRE IAS CHATAS (A98765) EM DIVERSAS LINHAS DA PLANTADEIRA, RESULTANDO EM DISTRIBUIÇÃO INADEQUADA DE SEMENTES DURANTE A OPERAÇÃO. TAMBÉM FOI CONSTATADO DESGASTE IRREGULAR EM POLIAS DE ACIONAMENTO E POLIAS TENSORAS, OCASIONANDO DESALINHAMENTO DO CONJUNTO E AGRAVANDO A F ALHA DAS CORREIAS. A FALHA OCORREU DE FORMA PREMATURA, EM EQUIPAMENTO NOVO E COM POUCAS HORAS DE USO, SENDO REGISTRADA EM VÁRIAS PLA NTADEIRAS DA REGIÃO.',ca:'A CAUSA RAIZ DA FALHA ESTÁ RELACIONADA AO DESGASTE PREMATURO DAS POLIAS DE ACIONAMENTO E POLIAS TENSORAS, ALGUMAS APRESENTANDO REBAR BAS, O QUE PROVOCOU DESALINHAMENTO DO SISTEMA. ESSE DESALINHAMENTO FEZ COM QUE AS CORREIAS TRABALHASSEM FORA DE CENTRO, SOB TENSÃO I NCORRETA E ATRITO LATERAL EXCESSIVO, ACELERANDO O DESGASTE DOS FIOS DA CORREIA E LEVANDO À FALHA PREMATURA DO MATERIAL. COMO CONSEQU ÊNCIA DESSE FUNCIONAMENTO IRREGULAR, OCORREU FALHA EM CASCATA, AFETANDO OUTROS COMPONENTES DO SISTEMA. A PEÇA PH85244204 FOI IMPACTA DA DEVIDO ELA PASSAR A OPERAR SOB SOBRECARGA, VIBRAÇÃO EXCESSIVA E TRANSMISSÃO IRREGULAR DE TORQUE, DEVIDO AO DESGASTE DAS CORREIAS E AO DESALINHAMENTO DAS POLIAS. ESSA CONDIÇÃO ESTÁ ALINHADA COM A SOLUÇÃO DTAC 226577, QUE TRATA JUSTAMENTE DE FALHAS PREMATURAS DAS CORREIAS ASSOCIADAS A PROBLEMAS DE POLIAS E ALINHAMENTO.',rp:'FOI REALIZADA A SUBSTITUIÇÃO COMPLETA DAS CORREIAS CHATAS A98765 EM TODAS AS LINHAS DA PLANTADEIRA, BEM COMO A SUBSTITUIÇÃO DAS POLI AS DANIFICADAS E DOS COMPONENTES AFETADOS PELA FALHA EM CASCATA, INCLUINDO A PEÇA PH85244204. APÓS A SUBSTITUIÇÃO, FOI EFETUADO O AL INHAMENTO CORRETO DO CONJUNTO, CONFORME ORIENTAÇÃO DA SOLUÇÃO DTAC 226577, E REALIZADOS TESTES FUNCIONAIS COM ACIONAMENTO DOS MOTORE S DOS DOSADORES E DAS TRANSPORTADORAS, CONFIRMANDO QUE O SISTEMA PASSOU A OPERAR SEM VIBRAÇÃO, SEM DESALINHAMENTO E DENTRO DAS CONDI ÇÕES NORMAIS DE FUNCIONAMENTO, SOLUCIONANDO DEFINITIVAMENTE O PROBLEMA. APESAR DE A CORREIA SER CLASSIFICADA COMO PEÇA DE DESGASTE, O PADRÃO APRESENTADO CARACTERIZA FALHA PREMATURA, ASSOCIADA A CONDIÇÕES ANORMAIS DE TRABALHO GERADAS POR POLIAS DESGASTADAS, CONFORM E JÁ RECONHECIDO PELA FÁBRICA NA SOLUÇÃO 226577.',obs:'REGISTRAR FALHA'},
  {c:'RE567062',m:'8400',h:'20H',n:'55885',d:'2026-01-31 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO QUE O ROLAMENTO DA PARTE DE BAIXO DO VARICOOL RE567062 VEIO A ESTOURAR E D ANIFICAR TODA ESTRUTURA DO VARICOOL SENDO RADIADOR HÉLICE E PROTEÇÕES.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO, NA QUAL FOI CONSTATADO QUE O ROLAMENTO INFERIOR DO VARICOOL (RE567062) SOFREU RUPTURA, OCASIO NANDO DANOS SEVEROS EM TODA A ESTRUTURA DO CONJUNTO VARICOOL, INCLUINDO RADIADOR, HÉLICE E PROTEÇÕES. A FALHA DO ROLAMENTO PROVOCOU UMA REAÇÃO EM CADEIA NO SISTEMA, COMPROMETENDO O ACIONAMENTO DA VENTOINHA (RE572545). EM DECORRÊNCIA DISSO, OCORREU A QUEBRA DA HÉLI CE (AT208006), A QUAL ATINGIU E DANIFICOU O RADIADOR DE ÁGUA (RE579098). OS ROLAMENTOS SUPERIORES D O VARICOOL TAMBÉM FORAM AFETADOS PELA FALHA EM CADEIA. DIANTE DO CENÁRIO IDENTIFICADO, FOI REALIZADO TODO O PROCEDIMENTO DE DESMONTAG EM COMPLETA DO CONJUNTO VARICOOL, INCLUINDO A REMOÇÃO DAS PROTEÇÕES LATERAIS, QUE APRESENTAVAM DANOS RESULTANTES DO EVENTO MECÂNICO. DURANTE A INSPEÇÃO, CONSTATOU-SE A NECESSIDADE DE DESMONTAGEM TOTAL DO RADIADOR, A FIM DE VIABILIZAR A SUBSTITUIÇÃO DO RADIADOR DE ÁGUA, UMA VEZ QUE O MESMO FOI PERFURADO EM CONSEQUÊNCIA DA QUEBRA DA HÉLICE DO SISTEMA DE ARREFECIMENTO. APÓS A DESMONTAGEM DOS COMP ONENTES, PROCEDEU-SE À SUBSTITUIÇÃO DO RADIADOR DE ÁGUA POR UM COMPONENTE NOVO, CONFORME AS ESPECIFICAÇÕES DO FABRICANTE. EM SEGUIDA , REALIZOU-SE A MONTAGEM COMPLETA DO CONJUNTO, ABRANGENDO VARICOOL, PROTEÇÕES LATERAIS E SISTEMA DE ARREFECIMENTO, OBEDECENDO RIGORO SAMENTE AOS PROCEDIMENTOS TÉCNICOS E TORQUES RECOMENDADOS NO MANUAL. CONCLUÍDA A MONTAGEM, FOI EFETUADO O ABASTECIMENTO DO SISTEMA D E ARREFECIMENTO, BEM COMO A SANGRIA DO CIRCUITO, ASSEGURANDO O CORRETO FUNCIONAMENTO DO SISTEMA. POSTERIORMENTE, FORAM REALIZADOS TE STES OPERACIONAIS E FUNCIONAIS COM O EQUIPAMENTO EM FUNCIONAMENTO, NÃO SENDO CONSTATADAS FALHAS, VAZAMENTOS OU QUAISQUER ANOMALIAS. DESSA FORMA, O EQUIPAMENTO FOI LIBERADO PARA OPERAÇÃO, ENCONTRANDO-SE EM PERFEITAS CONDIÇÕES DE FUNCIONAMENTO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'VARICOOL COMPLETO INFERIOR + VARICOOL SUPERIOR + HELICE + RADIADOR TRATOR 8345 RE222978 - ROLAMENTO DO VARICOOL INFERIOR RE346081 – ROLAMENTO DO VARICOOL SUPERIOR E INFERIOR RE346082 – ROLAMENTO DO VARICOOL INFERIOR TRATOR 8400 RE346079 – ROLAMENTO DO VARICOOL SUPERIOR RE346081 – ROLAMENTO DO VARICOOL SUPERIOR RE346082 – ROLAMENTO DO VARICOOL SUPERIOR RE567062 – ROLAMENTO DO VARICOOL INFERIOR - Varicool superior tem a engrenagem - o mais importante Varicool inferior tem a mola - Ligado na Helice'},
  {c:'RE590601',m:'8400',h:'9H',n:'18479',d:'2025-12-29 00:00:00',rc:'Sistema hidráulico com dificuldade para operar implementos e ruído na bomba durante operação',ca:'Bomba de carga da bomba principal não atingia a pressão correta.',rp:'Remoção dos rodados traseiros para acesso à bomba. Desmontagem dos periféricos e substituição da bomba. Reconexão de todas as linhas hidráulicas e instalação de óleo e filtro novos. Testes de pressão e vazão realizados, com resultados dentro dos parâmetros. Reinstalação dos rodados e finalização do atendimento.',obs:''},
  {c:'AXE73160',m:'730 PLATAFORMA',h:'8H',n:'1936',d:'2026-01-20 00:00:00',rc:'Cliente relata vibração excessiva na caixa de acionamento da navalha.',ca:'Durante a inspeção técnica, foi constatada vibração excessiva proveniente da caixa de acionamento da navalha. Após desmontagem e verificação dos componentes, identificou-se falha no cardan AXE96967, permitindo a soltura da porca CE19586, o que provocou o desalinhamento e consequente dano à polia CE19249 e aos componentes internos da caixa',rp:'Foi realizada a remoção da plataforma para acesso ao conjunto. Em seguida, efetuou-se a desmontagem, inspeção e montagem da caixa de acionamento da navalha conforme os procedimentos descritos no manual TM805654 GR50 SGR15 (Desmontagem e Montagem da Caixa de Acionamento da Navalha). Todos os componentes danificados foram substituídos conforme especificação do fabricante. Após a conclusão dos reparos, o conjunto foi montado e testado em operação, não apresentando mais vibração ou anormalidades. A máquina foi liberada par a retorno às atividades normais.',obs:'REGISTRAR FALHA'},
  {c:'AXE68588',m:'S760',h:'30H',n:'54997',d:'2025-12-29 00:00:00',rc:'CLENTE SOLICITOU VERIFICAÇAO DO SEU EQUIPAMENTO ALEGANDO PROBLEMAS NO ALIMENTADOR',ca:'REALIZOU-SE A INSPEÇAO NO SEU EQUIPAMENTO E VERIFICOU-SE O QUE HOUVE UMA TRINCA PREMATURA NA PARTE FRONTAL INFERIOR DA ESTRUTURA DO ALIMENTADOR AXE68588 PROXIMO A BASE DE APOIO DO PISTÃO DE LEVANTE DO ALIMENTADOR. TENDO QUE A FALHA OCORREU NA ESTRUTURA PRINCIPAL DO ALIMENTADOR, A REPARAÇÃO SERIA A TROCA DO COMPONENTE COMPLETO DE ACORDO COM O CATALOGO DE PEÇAS, ENTRETANTO EM RAZÃO DO COMPONENTE NÃO POSSUIR DISPONIBILIDADE DE ESTOQUE A PRONTA ENTREGA, REALIZAMOS UMA REPARAÇÃO PREVIA PROVISÓRIA COM SOLDAGEM NO LOCAL, E A SOLICITAÇÃO DE PEDIDO DO COMPONENTE DANIFICADO PARA SUBSTITUIÇÃO POSTERIOR. EFETUAMOS A SUBSTITUIÇAO DA PEÇA COM FALHA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇAO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA',obs:'REGISTRAR FALHA'},
  {c:'AL38238',m:'S680',h:'60H',n:'55108',d:'2026-01-30 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO QUE APRESENTOU CÓDIGO DE FALHA RELACIONADO AO SISTEMA PRODRIVE, ASSOCIADO A BAIXA PRESSÃO HIDRÁULICA, VAZAMENTO ANORMAL DE ÓLEO E PERDA DE DESEMPENHO DO SISTEMA DE TRANSMISSÃO, COMPROMETENDO O FUNCIONAMENTO NORMAL DO EQUIPAMENTO DURANTE A OPERAÇÃO.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE APÓS A REALIZAÇÃO DE TODOS OS TESTES ELÉTRICOS E HIDRÁULICOS RECOMENDADOS P ELO SERVICE ADVISOR, INCLUINDO MEDIÇÕES NOS ENDEREÇOS PTP 15, PTP 30 E PTP 82, CONSTATOU-SE PRESSÃO HIDRÁULICA ABAIXO DO ESPECIFICA DO, PERSISTENTE MESMO APÓS SUBSTITUIÇÃO DO SENSOR B89 E CONFIRMAÇÃO POR MANÔMETRO EXTERNO (RE190805). DIANTE DA PERSISTÊNCIA DA FALH A, FOI REALIZADA A REMOÇÃO E DESMONTAGEM COMPLETA DA TRANSMISSÃO PRODRIVE, ONDE FORAM IDENTIFICADAS AS SEGUINTES ANOMALIAS INTERNAS : PARAFUSOS 19M8448 SOLTOS E QUEBRADOS, ALOJADOS NA CARCAÇA DO PACOTE DO FREIO DE ESTACIONAMENTO, COMPROMETENDO A VEDAÇÃO DO CONJUNT O ; EMPENAMENTO DO EIXO DE31380, CAUSADO POR ESFORÇO EXCESSIVO DECORRENTE DA FIXAÇÃO INADEQUADA; TRAVA DO PISTÃO L33165 SOLTA, PERMI TI NDO QUE O PISTÃO CE19159 OPERASSE SEM FIXAÇÃO CORRETA, DANIFICANDO A CARCAÇA CE30231; DISCOS DE20344 QUEIMADOS E LISOS E PRATOS D E E MBREAGEM R64197 EMPENADOS, CARACTERIZANDO SUPERAQUECIMENTO E FUGA INTERNA DE ÓLEO; PACOTE DO FREIO DE ESTACIONAMENTO DANIFICADO, OCA SIONANDO VAZAMENTO DE ÓLEO, BAIXA PRESSÃO HIDRÁULICA E FALHA NO SISTEMA PRODRIVE. ESSAS CONDIÇÕES RESULTARAM EM FUGA INTERNA NO CIRCUITO HIDRÁULICO, PERDA DE PRESSÃO NO SISTEMA E GERAÇÃO DOS CÓDIGOS DE FALHA REPORTADOS. FOI REALIZADA A DRENAGEM COMPLETA DO ÓL EO DO SISTEMA PRODRIVE E A DESINSTALAÇÃO TOTAL DA TRANSMISSÃO, SEGUINDO RIGOROSAMENTE OS PROCEDIMENTOS DO MANUAL DO SERVICE ADVISOR. COM O CONJUNTO EM BANCADA, FORAM EXECUTADOS OS SEGUINTES REPAROS: EXTRAÇÃO DOS PARAFUSOS QUEBRADOS POR PROCESSO DE SOLDA E REMOÇÃO CONT ROLADA; SUBSTITUIÇÃO COMPLETA DO PACOTE DO FREIO DE ESTACIONAMENTO, INCLUINDO DISCOS, SEPARADORES E ANÉIS DE VEDAÇÃO; SUBSTITUI ÇÃO D OS COMPONENTES INTERNOS DANIFICADOS, INCLUINDO EIXO, PISTÃO, TRAVAS, DISCOS E PRATOS DE EMBREAGEM; INSTALAÇÃO DE PARAFUSOS NOV OS CON FORME ESPECIFICAÇÃO TÉCNICA; MONTAGEM COMPLETA DA TRANSMISSÃO CONFORME PROCEDIMENTOS DO FABRICANTE; REINSTALAÇÃO DA PRODRIVE NO EQUI PAMENTO E ABASTECIMENTO COM LUBRIFICANTE ESPECIFICADO. APÓS A MONTAGEM, FORAM REALIZADAS NOVAS MEDIÇÕES DE PRESSÃO HIDRÁULIC A, QUE S E APRESENTARAM DENTRO DOS PARÂMETROS ESPECIFICADOS, ALÉM DE TESTES OPERACIONAIS EM CAMPO JUNTO AO CLIENTE, CONFIRMANDO FUNC IONAMENTO NORMAL, AUSÊNCIA DE VAZAMENTOS E ELIMINAÇÃO DOS CÓDIGOS DE FALHA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA. A FALHA TEVE ORIGEM INTERNA NO PACOTE DO FREIO DE ESTACIONAMENTO DA TRANSMISSÃO PRODRIVE, OCASIONANDO DANOS MECÂNICOS, VAZAMENTO DE ÓLEO E BAIXA PRESSÃO HIDRÁU LICA, SENDO PLENAMENTE SOLUCIONADA APÓS O REPARO COMPLETO DO CONJUNTO, RESTABELECENDO AS CONDIÇÕES NORMAIS DE OPERAÇÃO DO EQUIPAMENT O.',obs:'REGISTRAR FALHA'},
  {c:'AKK22470',m:'4040',h:'9H',n:'54706',d:'2025-12-04 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NO CUBO DE RODA TRASEIRO',ca:'Realizou-se a inspeção no equipamento após constatação de travamento da roda, sendo identificada falha funcional no conjunto interno do cubo, incompatível com as condições normais de operação. Durante a desmontagem e abertura técnica do cubo da roda, verificou-se que o freio estacionário interno não estava liberando adequadamente, ocasionando atrito contínuo e travamento do conjunto. Foi constatada aderência entre os discos e anéis do pacote de freio, impedindo a correta separação dos componentes no momento do acionamento hidráulico de liberação. A inspeção evidenciou desgaste interno acentuado. Como parte do procedimento técnico, realizou-se a coleta de amostra do óleo lubrificante para análise laboratorial, cujo resultado confirmou a presença de partículas metálicas, especificamente ferro e cobre, materiais associados aos discos, anéis e superfícies internas do cubo. Essa condição confirmou o desgaste interno do componente e reforçou a falha no conjunto do freio estacionário interno. Ressalta-se que o cubo já havia sido substituído recentemente e voltou a apresentar falha, caracterizando possível defeito interno do componente. Diante dos fatos constatados, foi necessária a substituição completa do cubo de roda, seguindo rigorosamente as orientações técnicas e os procedimentos estabelecidos no manual de reparação. Após a montagem do novo componente, foram realizados testes operacionais no equipamento, os quais confirmaram o pleno funcionamento do conjunto, restabelecendo as condições normais de operação.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA',obs:'REGISTRAR FALHA'},
  {c:'AN208074',m:'4025',h:'9H',n:'54334',d:'2025-11-10 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO VAZAMENTO NO CUBO DE RODA.',ca:'Realizou-se a inspeção no equipamento após constatação de vazamento de óleo no cubo da roda dianteira esquerda. Durante a verificação visual inicial, foi confirmado vazamento ativo na região do cubo. Iniciou-se o procedimento de desmontagem com a remoção do abridor de linha. O equipamento foi devidamente calçado e macaqueado para garantir segurança na execução do serviço. Na sequência, foram removidos a roda e o disco de freio. Posteriormente, realizou-se a drenagem do óleo do cubo e a abertura do conjunto. Durante a desmontagem, foram removidos o rolamento e a porca de fixação. Constatou-se que os rolamentos apresentavam danos decorrentes de deficiência de lubrificação. Foi identificada falha na vedação da peça AN208074, cujo retentor encontrava-se comprometido, permitindo o vazamento do óleo lubrificante. Com a perda da vedação, ocorreu redução significativa da lubrificação interna do conjunto, ocasionando funcionamento dos rolamentos em condição inadequada (trabalho a seco). Essa condição elevou o atrito e a temperatura de operação, resultando em desgaste prematuro, geração de folgas internas, ruído anormal, vibração e perda de eficiência do conjunto. Foram substituídos: Retentor (AN208074) Rolamento Capa do rolamento Passador Porca de fixação (quando aplicável) Após a substituição dos componentes danificados, o conjunto foi remontado conforme procedimento técnico, o cubo foi fechado e abastecido com óleo lubrificante especificado. Em seguida, reinstalaram-se o disco de freio, a roda e o abridor de linha. O equipamento foi testado em operação, não apresentando mais vazamentos ou anormalidades de funcionamento. Observação: As peças envolvidas haviam sido substituídas recentemente e voltaram a apresentar falha, indicando possível defeito prematuro do componente de vedação (AN208074), que comprometeu todo o conjunto devido à perda de lubrificação.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA',obs:'REGISTRAR FALHA'},
  {c:'AH160080',m:'S770',h:'2H',n:'55781',d:'2026-01-27 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NA CORREIA DO TUBO DESCARREGADOR.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE ESTAVA COM PROBLEMA NA CORREIA DO DESCARREGADOR. NOS DESLOCAMOS ATÉ A PROPR IEDADE DO CLIENTE PARA ANALISAR O CASO. AO CHEGAR O OPERADOR NOS INFORMOU QUE A CORREIA DO DESCARREGADOR ESTAVA ESCAPANDO, REALIZAMO S A REMOÇÃO DA CORREIA PARA MELHOR AVERIGUAÇÃO DO SEU ESTADO FÍSICO E PERCEBEMOS QUE A MESMA ESTAVA CORROÍDA NAS LATERAIS, CAUSANDO O DESENGATE DA POLIA DURANTE O TRABALHO. OBSERVAMOS QUE O INCOMODO VEIO OCORRER DEVIDO A FALHA NO MATERIAL DA PEÇA, VISTO QUE A MESM A TRABALHOU POUCAS HORAS E JÁ APRESENTOU FALHA. FIZEMOS A SUBSTITUIÇÃO DA CORREIA DANIFICADA POR UMA NOVA, MONTAMOS TUDO NOVAMENTE, TENSIONAMOS E TESTAMOS E VEIO SOLUCIONAR O PROBLEMA DO CLIENTE.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'REGISTRAR FALHA'},
  {c:'KK118319',m:'4040DN',h:'25H',n:'55203',d:'2026-01-08 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NAS BALANÇAS',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE HAVIA UMA FALHA NO SISTEMA DE PESAGEM DO DN, QUE ESTAVA APRESENTANDO O CÓDIGO DE ERRO +RANGER E INDICANDO PESO INCORRETO. AO FAZER A INSPEÇÃO NÃO FOI ENCONTRADO NENHUM DANOS VISUALMENTE NAS CÉDULAS DAS BALANÇAS. POSSIVELMENTE O PROBLEMA DEVE SER INTERNO. COM O AUXÍLIO DE UM CAVALETE E DE UM MACACO HIDRÁULICO, ELEVAMOS A CAIXA PARA PERMITIR A REMOÇÃO DO SENSOR COM SEU SUPORTE COMPLETO. FIZEMOS A SUBSTITUIÇÃO DAS PEÇAS DANIFICADAS, REINSTALAMOS O CONJUNTO, REALIZAMOS O APERTO ADEQUADO DOS PARAFUSOS E EFETUAMOS OS TESTES OPERACIONAIS. APÓS A MONTAGEM FINAL O EQUIPAMENTO VOLTOU A FUNCIONAR CORRETAMEN TE, SOLUCIONANDO O PROBLEMA DO CLIENTE. POSSIVEL DEFEITO DA PEÇA, APÓS A TROCA DA PEÇA DANIFICADA O PROBLEMA FOI SOLUCIONADO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'REGISTRAR FALHA'},
  {c:'DZ122389',m:'5090',h:'5H',n:'55620',d:'2026-01-21 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NA BOMBA DE COMBUSTIVEL',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE A BOMBA DE COMBUSTIVEL ESTAVA DANIFICADA. IDENTIFICADA FALHA INTERNA NA BOMBA INJETORA DE COMBUSTÍVEL COM BAIXO TEMPO DE USO. COMPONENTE NÃO MANTINHA PRESSÃO ADEQUADA NO SISTEMA, OCASIONANDO FALHA NO FUNCIONAMENTO DO MOTOR. NÃO FORAM CONSTATADOS INDÍCIOS DE CONTAMINAÇÃO, MAU USO OU INSTALAÇÃO INADEQUADA. REALIZADA SUBSTITUIÇÃO DA BOMBA E TESTES FINAIS, APÓS A TROCA DAS PEÇAS DANIFICADAS O PROBLEMA FOI SOLUCIONADO. E O SISTEMA FICOU OPERANDO NORMALMENTE.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'REGISTRAR FALHA'},
  {c:'AKK42974',m:'PUK PV',h:'10H',n:'55597',d:'2026-01-20 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NA CAMERA 3',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE DURANTE O PROCEDIMENTO DE CALIBRAÇÃO DAS CÂMERAS DO KIT SEE SPRAY INSTALADO NO EQUIPAMENTO M4030, FOI IDENTIFICADA UMA ANOMALIA NA CÂMERA DE NÚMERO 03. OBSERVOU-SE A PRESENÇA DE UMIDADE OU PRINCÍPIO DE INFIL TRAÇÃO DE ÁGUA NO INTERIOR DO DISPOSITIVO. ESSA CONDIÇÃO REFLETIU DIRETAMENTE NA QUALIDADE DA IMAGEM, QUE SE APRESENTOU BORRADA E C O MPROMETIDA NO MONITOR DO EQUIPAMENTO DURANTE A CALIBRAÇÃO. APÓS ANÁLISE TÉCNICA, IDENTIFICOU-SE QUE A FALHA ESTAVA RELACIONADA À C ÂM ERA 03, INDICANDO POSSÍVEL DEFEITO INTERNO DO COMPONENTE QUE POSSUI MÁ VEDAÇÃO E POR ISSO ENTROU UMIDADE. DIANTE DISSO, FOI REALI ZAD A A SUBSTITUIÇÃO DA CÂMERA 03. APÓS A INSTALAÇÃO DA CÂMERA NOVA, O EQUIPAMENTO FOI TESTADO E ASSIM FOI CONSTATADO A SOLUÇÃO DO P ROBL EMA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADSO, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'Informação padrão registrada: Fábrica paga 10 horas de trabalho para esta falha quando relacionada a esta peça chave neste modelo. Regra adicional obrigatória: Sempre que esta peça for informada como peça falha, incluir na OBS a mensagem exatamente como segue: "ESSA PECA FAZ PARTE DO CHASSI DO PUK. LEMBRE DE VERIFICAR E ALTERAR O CHASSI.'},
  {c:'AXE94974',m:'S770',h:'2H',n:'54889',d:'2025-12-16 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NO ATUADOR DA CONTRA FACA.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE O ATUADOR DA CONTRAFAÇA E O CHICOTE ELÉTRICO DO MESMO APRESENTAVAM DANOS. FALHA INTERNA NO ATUADOR DAS CONTRA-FACAS (AXE94974), QUE DEIXOU DE EXECUTAR O MOVIMENTO CONFORME COMANDADO PELO SISTEMA ELETRÔNICO DO EQUIPAMENTO, OCASIONANDO A GERAÇÃO DO CÓDIGO RC1 517486.08 E A INDISPONIBILIDADE DA FUNÇÃO, SEM EVIDÊNCIAS DE INTERFERÊNCIA EXTERNA, MAU USO, FALHA DE INSTALAÇÃO OU ANOMALIAS NO CIRCUITO ELÉTRICO. REALIZAMOS A SUBSTITUIÇÃO DO ATUADOR DAS CONTRA-FACAS (AXE94974). APÓS A SUBSTITUIÇÃO, O CÓDIGO DE FALHA FOI ELIMINADO E O SISTEMA PASSOU A OPERAR CORRETAMENTE, RESTABELECENDO O FUNCIONAMENTO DAS C ONTRA-FACAS. EM SEGUIDA TESTAMOS O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA',obs:'REGISTRAR FALHA'},
  {c:'AXE81549',m:'S770',h:'2H',n:'55295',d:'2026-01-11 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO QUE O MOTOR DA PENEIRA ESTAVA COM FALHA.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE APRESENTAVA DEFEITO NO ATUADOR DA PENEIRA. DURANTE A INSPEÇÃO, CONSTATOU-SE QUE O CIRCUITO ELÉTRICO ESTAVA FUNCIONANDO PERFEITAMENTE. NO ENTANTO, O ATUADOR NÃO OPERAVA DE FORMA ADEQUADA. POSSIVEL DEFEITO INTERNO DA PEÇA. FOI REALIZADA A SUBSTITUIÇÃO DO ATUADOR DA PENEIRA SUPERIOR (AXE81549). APÓS A SUBSTITUIÇÃO, FORAM EFETUADOS TESTES JUNTAMENTE COM O OPERADOR, NOS QUAIS O EQUIPAMENTO APRESENTOU FUNCIONAMENTO NORMAL, SOLUCIONANDO O PROBLEMA RELATADO PELO CLIENTE.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'REGISTRAR FALHA'},
  {c:'AXE63845',m:'S770',h:'1,25H',n:'55456',d:'2026-01-15 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO CÓDIGO DE ERRO MFC (516826.12)',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE ESTAVA COM CÓDIGO DE ERRO MFC (516826.12) QUE APONTAVA UMA FALHA INTERNA NA SENSOR DE FORÇA TRASEIRO DO GRANELEIRO, REALIZAMOS O PROCEDIMENTO DE CALIBRAÇÃO E ATUALIZAÇÃO DA MESMA, PORÉM NÃO HOUVE SUCESSO. FA LHA INTERNA NO SENSOR DE FORÇA, IMPEDINDO O FUNCIONAMENTO CORRETO E CALIBRAÇÕES. APÓS TODOS OS PROCEDIMENTOS CITADOS ACIMA, DECIDIMO S SEGUIR COM AS RECOMENDAÇÕES DE SOLUÇÃO DO CÓDIGO DE ERRO APRESENTADO NO MONITOR, SUBSTITUÍDO O SENSOR DE FORÇA POR UM OUTRO EM BOA S CONDIÇÕES, APÓS A SUBSTITUIÇÃO O CÓDIGO DE ERRO DESAPARECEU, REALIZAMOS O TESTE EM CAMPO JUNTO AO CLIENTE E NOTAMOS QUE A MESMA VO LTOU A OPERAR NORMALMENTE. RESOLVENDO ASSIM O PROBLEMA DO CLIENTE.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O POBLEMA.',obs:'Este equipamento possui 3 sensores. Considerar multiplicação pela quantidade substituída.'},
  {c:'RE567062',m:'8400',h:'9.5H',n:'55162',d:'2026-01-07 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO QUE O VARICOOL ESTOUROU.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE O SISTEMA VARICOOL ENCONTRAVA-SE TRAVADO, HAVENDO INDÍCIOS DE QUE O ROLAMENTO NÃO SUPORTOU AS CONDIÇÕES NORMAIS DE TRABALHO. FOI NECESSÁRIA A REMOÇÃO DAS CARENAGENS LATERAIS DIREITA E ESQUERDA, A FIM DE OBTER ACESSO AO SISTEMA VARICOOL. EM SEGUIDA, REALIZOU-SE A SOLTURA DA HÉLICE DO MOTOR E A RETIRADA DO CONJUNTO COMPLETO DA PARTE INFERIOR DO VARICOOL PARA INSPEÇÃO DETALHADA. A PARTE SUPERIOR FOI VERIFICADA E ENCONTRAVA-SE EM CONDIÇÕES NORMAIS; ENTRETANTO, AO DESMONT AR A PARTE INFERIOR, CONSTATOU-SE QUE O ROLAMENTO RE567062 ESTAVA COMPLETAMENTE TRAVADO, OCASIONANDO DANOS AOS DEMAIS COMPONENTES DO SISTEMA. EM FUNÇÃO DO ROLAMENTO TER ESTOURADO E O CONJUNTO TER TRABALHADO COM FOLGA, OCORREU A DANIFICAÇÃO DA CARCAÇA DO VARICOOL, E CAUSOU TAMBÉM O DESGASTE PREMATURO DA CORREIA DO VARICOOL. SENDO NECESSÁRIA A SUBSTITUIÇÃO DO CONJUNTO INFERIOR COMPLETO E DA CORR EIA. APÓS A SUBSTITUIÇÃO, O SISTEMA VARICOOL FOI TOTALMENTE REMONTADO, O TRATOR FOI LIGADO E TESTADO, APRESENTANDO FUNCIONAMENTO COR RETO, E, NA SEQUÊNCIA, FORAM REINSTALADAS AS CARENAGENS E DEMAIS ITENS DESMONTADOS. POSSÍVEL DEFEITO NA PEÇA ANTERIORMENTE SUBSTITUÍ DA, A QUAL OPEROU POR POUCAS HORAS ANTES DE VOLTAR A APRESENTAR FALHA. APÓS A SUBSTITUIÇÃO DAS PEÇAS E A REALIZAÇÃO DE NOVOS TESTES OPERACIONAIS, O EQUIPAMENTO PASSOU A FUNCIONAR CORRETAMENTE, SOLUCIONANDO O PROBLEMA APRESENTADO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'VARICOOL COMPLETO INFERIOR'},
  {c:'AXE68069',m:'S770',h:'1.25H',n:'55518',d:'2026-01-17 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NA ROTAÇÃO DO ESPALHADOR',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE HAVIA UMA FALHA NA ROTAÇÃO DO ESPALHADOR. AO CHEGAR NO EQUIPAMENTO E VERIFI CAR OS CÓDIGOS DE ERROS HAVIA O CÓDIGO HAD 522115.1, INDICANDO QUE O SENSOR (AXE68069) DO ESPALHADOR DIREITO ESTAVA COM DEFEITO. FO I SUBSTITUÍDO O SENSOR DO ESPALHADOR DIREITO, TESTAMOS EM CAMPO ONDE O EQUIPAMENTO VOLTOU A TRABALHAR NORMALMENTE. POSSIVEL DEFEITO INTERNO DO SENSOR, APÓS A TROCA DA PEÇA O PROBLEMA FOI SOLUCIONADO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS , TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'Este equipamento possui 2 sensores. Considerar multiplicação pela quantidade substituída.'},
  {c:'RE346081',m:'8345R',h:'10H',n:'55916',d:'2026-01-30 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NO VARICOOL INFERIOR',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE HOUVE UMA FALHA NO VARICOOL INFERIOR. O ROLAMENTO RE346081 ESTOUROU, CAUSANDO ASSIM UM SUPER AQUECIMENTO. FIZEMOS UMA INSPEÇÃO E IDENTIFICAMOS QUE O POSSIVELMENTE HOUVE POUCA GRAXA DENTRO DO ROLAMENTO (QUE É BLINDADO JÁ VINDO DE FÁBRICA), QUE FEZ COM O QUE O ROLAMENTO ESTOURASSE DANIFICANDO ASSIM A CORREIA DO VARICOOL, OS ROLAMENTOS, VEDAÇÕES E A POLIA. FIZEMOS A SUBTITUIÇÃO DE TODAS AS PEÇAS DANIFICADAS, APÓS A TROCA TESTAMOS O EQUIPAMENTO EM OPERAÇÃO, SOLUCIONAND O ASSIM O PROBLEMA DO CLIENTE. POSSIVEL DEFEITO DA PEÇA, EQUIPAMENTO TRABALHOU POUCO TEMPO E VOLTOU A APRESENTAR FALHA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS , TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'VARICOOL INFERIOR - Varicool superior tem a engrenagem - o mais importante Varicool inferior tem a mola - Ligado na Helice'},

  {c:'RE346081',m:'8370',h:'10H',n:'56242',d:'2026-02-23 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NO VARICOOL.',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE HOUVE UMA FALHA NO VARICOOL. O ROLAMENTO RE346081 ESTOUROU, CAUSANDO ASSIM UM SUPER AQUECIMENTO. FIZEMOS UMA INSPEÇÃO E IDENTIFICAMOS QUE O POSSIVELMENTE HOUVE POUCA GRAXA DENTRO DO ROLAMENTO (QUE É BLINDADO JÁ VINDO DE FÁBRICA), QUE FEZ COM O QUE O ROLAMENTO ESTOURASSE DANIFICANDO ASSIM A CORREIA DO VARICOOL, O VARICOOL SUPERIOR E INFERIOR, OS ROLAMENTOS, VEDAÇÕES E A POLIA. FIZEMOS A SUBTITUIÇÃO DE TODAS AS PEÇAS DANIFICADAS, APÓS A TROCA TESTAMOS O EQUIPAMENTO EM OPERAÇÃO, SOLUCIONANDO O ASSIM O PROBLEMA DO CLIENTE. POSSIVEL DEFEITO DA PEÇA, EQUIPAMENTO TRABALHOU POUCO TEMPO E VOLTOU A APRESENTAR FALHA.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'VARICOOL SUPERIOR E INFERIOR E CORREIA.'},
  {c:'JD10020',m:'S790',h:'11H',n:'55997',d:'2026-02-06 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NOS ROLAMENTOS',ca:'CONSTATADO ESTOURO DO ROLAMENTO DO EIXO DAS ENGRENAGENS QUE ACIONAM A ESTEIRA DO ALIMENTADOR. O ROMPIMENTO DO ROLAMENTO OCASIONOU TR AVAMENTO DO CONJUNTO E OPERAÇÃO EM CONDIÇÃO DE ATRITO DIRETO (FERRO COM FERRO), GERANDO SUPERAQUECIMENTO EXCESSIVO DO EIXO. O CALOR ELEVADO FAVORECEU O INÍCIO DA COMBUSTÃO. INFORMAMOS QUE A LIMPEZA ERA FEITA DE FORMA ADEQUADA. POSSÍVEL DEFEITO DA PEÇA, VISTO QUE O ROLAMENTO ESTOUROU SEM MOTIVO OU CAUSA APARENTE. REALIZADA INSPEÇÃO TÉCNICA E, PARA ACESSO AO COMPONENTE DANIFICADO, FOI NECESSÁRIO ALIVIAR E SOLTAR O ESTICADOR DA ESTEIRA DO ALIMENTADOR, POSSIBILITANDO A REMOÇÃO DA ESTEIRA. POST ERIORMENTE, EFETUADA A SOLTURA DAS ENGRENAGENS DO EIXO E RETIRADA COMPLETA DO EIXO DO ALIMENTADOR PARA AVALIAÇÃO DETALHADA. DEVIDO A O SUPERAQUECIMENTO CAUSADO PELO ROMPIMENTO DO ROLAMENTO, O EIXO APRESENTOU EMPENAMENTO (TORTURA) E DANOS TÉRMICOS. TAMBÉM FORAM CONS TATADAS AVARIAS NA CARCAÇA (MANCAL) E DEMAIS COMPONENTES DO CONJUNTO. REALIZADA A SUBSTITUIÇÃO DO EIXO, ROLAMENTOS, CARCAÇA E DEMAIS ITENS AFETADOS. APÓS MONTAGEM DO CONJUNTO, FORAM REALIZADOS TESTES OPERACIONAIS, CONFIRMANDO O PLENO FUNCIONAMENTO DO SISTEMA. O IN CÊNDIO NÃO SE PROPAGOU PARA OUTRAS ÁREAS DA MÁQUINA, NÃO HOUVE DANOS ESTRUTURAIS ADICIONAIS, NÃO ATINGIU OUTROS SISTEMAS E NÃO HOUVE FERIDOS. A MÁQUINA ENCONTRA-SE EM OPERAÇÃO NORMAL. RELATORIO DE INCENDIO EM ANEXO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'RELATORIO DE INCENDIO NECESSARIO PARA ESTE CASO'},
  {c:'R520223',m:'S770',h:'85H',n:'55910',d:'2026-02-09 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NO MOTOR',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO APÓS RELATO DE RUÍDO ANORMAL NO MOTOR E EXCESSO DE FUMAÇA DURANTE A OPERAÇÃO DE COLHEITA. DURANTE A VERIFICAÇÃO INICIAL, FOI REMOVIDA A TAMPA DE VÁLVULAS, MOMENTO EM QUE FORAM IDENTIFICADAS MOLAS E PINOS DANIFICADOS, ALÉM DE VARETAS COM AVARIAS. DANDO CONTINUIDADE AO DIAGNÓSTICO, PROCEDEMOS COM A REMOÇÃO DO CABEÇOTE, ONDE FOI CONSTATADO QUE A VÁLVULA DE ADMISSÃO DO CILINDRO Nº 1 (R520223) HAVIA SOFRIDO QUEBRA ESTRUTURAL E CAÍDO NO INTERIOR DA CAMISA, COLIDINDO DIRETAMENTE COM O PISTÃO. A QUEBRA DA VÁLVULA OCORREU EM REGIME NORMAL DE OPERAÇÃO, SEM INDÍCIOS DE INTERFERÊNCIA EXTERNA, RESTRIÇÃO DE AR, SUPERAQUECIMENTO OU INGESTÃO DE CONTAMINANTES. A PARTIR DESSE EVENTO INICIAL, HOUVE COLISÃO DIRETA ENTRE A VÁLVULA E O PISTÃO, GERANDO DANOS SEVEROS AO PISTÃO, PINO DO PISTÃO E CAMISA DO CILINDRO, ALÉM DE DANOS AO CABEÇOTE (RE523680), ÀS VARETAS (R536992) E AOS BALANCINS (RE552370 / RE552371). COMO CONSEQUÊNCIA DA QUEBRA E DO IMPACTO INTERNO, OCORREU DESPRENDIMENTO DE PARTÍCULAS METÁLICAS, RESULTANDO NA CONTAMINAÇÃO INTERNA DO MOTOR, DO SISTEMA DE LUBRIFICAÇÃO E DO SISTEMA DE ESCAPE. DEVIDO À CIRCULAÇÃO DESTES DETRITOS PELO MOTOR, PARTÍCULAS METÁLICAS FORAM CARREADAS PARA O SISTEMA DE ESCAPE, OCASIONANDO O TRAVAMENTO DO TURBOCOMPRESSOR (DZ108118). ASSIM, A FALHA TEVE ORIGEM NA VÁLVULA DE ADMISSÃO R520223 E EVOLUIU EM EFEITO CASCATA PARA DIVERSOS COMPONENTES INTERNOS DO MOTOR. DIANTE DA EXTENSÃO DOS DANOS IDENTIFICADOS, FOI NECESSÁRIA A REMOÇÃO COMPLETA DO MOTOR DA MÁQUINA PARA EXECUÇÃO DOS REPAROS CORRETIVOS. INICIALMENTE FORAM DESCONECTADOS CHICOTES ELÉTRICOS, LINHAS DE COMBUSTÍVEL, MANGUEIRAS DO SISTEMA DE ARREFECIMENTO E REALIZADO O DESACOPLAMENTO DO CONJUNTO DA TRANSMISSÃO, POSSIBILITANDO A RETIRADA DO MOTOR DO CHASSI. EM SEGUIDA, FOI REALIZADA A DESMONTAGEM COMPLETA DO MOTOR, INCLUINDO A REMOÇÃO DO CABEÇOTE, PISTÕES, BIELAS, CÁRTER, BOMBA DE ÓLEO E SISTEMA DE BALANCINS, PARA EXTRAÇÃO DOS COMPONENTES DANIFICADOS E AVALIAÇÃO INTERNA DO CONJUNTO. APÓS A DESMONTAGEM, FOI EXECUTADA LIMPEZA TÉCNICA COMPLETA DO BLOCO E DAS GALERIAS DE ÓLEO, COM REMOÇÃO TOTAL DE PARTÍCULAS METÁLICAS, LAVAGEM INTERNA E INSPEÇÃO DOS COMPONENTES. NA SEQUÊNCIA, FORAM SUBSTITUÍDOS OS KITS DE CAMISA E PISTÃO, PINOS DE PISTÃO (DZ113594), PARAFUSOS DE BIELA (DZ124016), ROLAMENTOS (RE538581), BOMBA DE ÓLEO (RE543187), CABEÇOTE (RE523680), VÁLVULAS, VARETAS (R536992) E BALANCINS (RE552370 / RE552371), ALÉM DE TODAS AS JUNTAS, VEDADORES E COMPONENTES AFETADOS PELO EVENTO. DEVIDO À CONTAMINAÇÃO INTERNA DO MOTOR POR PARTÍCULAS METÁLICAS E À DESMONTAGEM COMPLETA DO CONJUNTO, FOI REALIZADA TAMBÉM A SUBSTITUIÇÃO DOS FILTROS DE ÓLEO E COMBUSTÍVEL, BEM COMO A RENOVAÇÃO DOS FLUIDOS, PROCEDIMENTO OBRIGATÓRIO PARA GARANTIR A LIMPEZA TOTAL DO SISTEMA DE LUBRIFICAÇÃO E EVITAR CONTAMINAÇÃO RESIDUAL QUE POSSA COMPROMETER OS NOVOS COMPONENTES INSTALADOS. NA ETAPA FINAL DO REPARO, FOI REALIZADA A SUBSTITUIÇÃO DO TURBOCOMPRESSOR (DZ108118), QUE HAVIA TRAVADO DEVIDO À CONTAMINAÇÃO POR DETRITOS METÁLICOS PROVENIENTES DA FALHA INTERNA DO MOTOR. APÓS A CONCLUSÃO DA MONTAGEM COMPLETA DO MOTOR, O CONJUNTO FOI REINSTALADO NA MÁQUINA, COM RECONEXÃO DE TODOS OS SISTEMAS E COMPONENTES. POSTERIORMENTE, FORAM EXECUTADOS TESTES OPERACIONAIS, PARTIDA ASSISTIDA E VERIFICAÇÕES DE FUNCIONAMENTO DO MOTOR, CONFIRMANDO O RESTABELECIMENTO DO DESEMPENHO NORMAL DO EQUIPAMENTO E A SOLUÇÃO DEFINITIVA DA FALHA. ADICIONALMENTE, FOI UTILIZADA TINTA VERDE PARA RECOMPOSIÇÃO DA PINTURA ORIGINAL DO CABEÇOTE E DOS COMPONENTES EXTERNOS SUBSTITUÍDOS, COM A FINALIDADE DE RESTABELECER O PADRÃO ORIGINAL DE ACABAMENTO DO MOTOR E PROPORCIONAR PROTEÇÃO ANTICORROSIVA ÀS SUPERFÍCIES METÁLICAS EXPOSTAS APÓS O REPARO.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:'REPARO DO MOTOR'},
  {c:'AN209934',m:'4030',h:'1,5h',n:'55708',d:'2026-01-24 00:00:00',rc:'CLIENTE SOLICITOU VERIFICAÇÃO DO SEU EQUIPAMENTO ALEGANDO FALHA NA VALVULA DE RETENÇÃO',ca:'REALIZOU-SE A INSPEÇÃO NO EQUIPAMENTO E VERIFICOU-SE QUE A VAZÃO NÃO ESTAVA ESTABILIZANDO E QUE ESTAVA OSCILANDO. RETIRAMOS A VÁLVUL A AN209934 VIMOS QUE A VALVULA ESTAVA QUEBRADA. A PEÇA DANIFICADA FOI SUBSTITUÍDA POR UMA NOVA E, APÓS A MANUTENÇÃO, O PULVERIZADOR VOLTOU A OPERAR NORMALMENTE, REALIZANDO A APLICAÇÃO SEM ANORMALIDADES. POSSIVEL DEFEITO DA PEÇA, QUE QUEBROU SEM MOTIVO OU CAUSA AP ARENTE.',rp:'PROCEDEU-SE COM A SUBSTITUIÇÃO DOS ITENS DANIFICADOS, TESTOU-SE O EQUIPAMENTO, SOLUCIONANDO O PROBLEMA.',obs:''},

function buscar(){
  const q=document.getElementById('sc').value.trim().toUpperCase();if(!q)return;
  const d=ld();
  // buscar por chassi/cliente
  let e=d.eq.find(x=>x.chassi.toUpperCase().includes(q)||(x.cliente||'').toUpperCase().includes(q));
  const br=document.getElementById('bres');
  if(e){br.innerHTML='';V.chassi=e.chassi;render();return;}
  // buscar por peca chave - listar todos os chassi que tem essa peca
  const sols=(d.sol||[]).filter(s=>(s.pc||'').toUpperCase().includes(q));
  if(sols.length>0){
    const chassisUnicos=[...new Set(sols.map(s=>s.chassi))];
    const detalhes=sols.map(s=>`<span class="bc-link" onclick="V.chassi='${s.chassi}';document.getElementById('bres').innerHTML='';render()">${s.chassi}</span> - OS <b>${s.os}</b> <span class="tag ${s.modalidade==='NORMAL'?'tg':s.modalidade==='PECAS'?'ty':'tb-blue'}" style="font-size:10px">${s.modalidade||'--'}</span>`).join('<br>');
    br.innerHTML=`<div class="alert-g" style="line-height:1.9"><i class="ti ti-tool"></i> Peca <b>${q}</b> encontrada em <b>${sols.length}</b> OS(s):<br>${detalhes}</div>`;
    return;
  }
  br.innerHTML=`<div class="alert-y">Nao encontrado. <button class="btn btn-o btn-sm" onclick="V.page='ne';render()">Cadastrar novo</button></div>`;
}

function pgPecas(d,b){

      ${sols.length?`<div style="margin-top:5px;font-size:12px;color:var(--ts)">Cortesias vinculadas: ${sols.map(s=>`<span class="bc-link" onclick="openSol('${s.id}')">${s.os||s.id}</span>`).join(', ')}</div>`:''}

function filtPecas(q){
  const d=ld();const hist=d.hp||[];
  const ql=q.toLowerCase();
  const f=q?PCBASE.filter(p=>p.c.toLowerCase().includes(ql)||p.m.toLowerCase().includes(ql)||p.rc.toLowerCase().includes(ql)):PCBASE;
  const el=document.getElementById('pc-lista');if(el)el.innerHTML=renderPcList(f,hist,d);
}

function editarPecaChave(cod){
  const p=PCBASE.find(x=>x.c===cod);if(!p)return;
  const d=ld();
  const hist=d.hp.filter(x=>x.codigo===cod);
  abrirModal(`Editar / Visualizar - ${cod}`,`

function selecionarMod(radio){

function getModalidade(){
  const r=document.querySelector('input[name="modalidade"]:checked');
  return r?r.value:'NORMAL';

function verificarHistFg(cod){
  const d=ld();
  const hist=(d.hp||[]).filter(h=>h.codigo.toLowerCase()===cod.toLowerCase());
  const al=document.getElementById('hist-fg-alert');if(!al)return;
  if(!hist.length){al.innerHTML='';return;}
  const media=(hist.reduce((a,h)=>a+(+h.horas_aprovadas||0),0)/hist.length).toFixed(1);
  al.innerHTML=`<div class="alert-g"><i class="ti ti-history"></i> <b>Historico encontrado:</b> ${hist.length} aprovacao(es) com media de <b>${media}h</b> pagas pela fabrica.</div>`;
}

function carregarImagem(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=function(e){
    window._imgB64=e.target.result.split(',')[1];window._imgMime=file.type;
    const uz=document.getElementById('upload-zone');
    const pw=document.getElementById('img-preview-wrap');
    const icon=document.getElementById('uz-icon');const txt=document.getElementById('uz-text');const sm=document.getElementById('uz-small');
    if(uz){uz.style.borderColor='var(--g)';uz.style.background='var(--gl)';}
    if(icon){icon.className='ti ti-circle-check';icon.style.color='var(--g)';}
    if(txt)txt.innerHTML='<b style="color:var(--g)">Imagem carregada!</b> Clique para trocar.';
    if(sm)sm.textContent='Cole outra com Ctrl+V para substituir.';
    if(pw)pw.innerHTML=`<img src="${e.target.result}" style="max-height:200px;border-radius:var(--r);border:1px solid var(--bd);margin-top:10px">`;
  };
  reader.readAsDataURL(file);
}
function handleImgSelect(input){carregarImagem(input.files[0]);}

  const d=ld();

  const userprompt='Analise a imagem e formule a garantia. Peca: '+( peca||'extrair')+'. Modelo: '+(modelo||'extrair')+'. Horimetro: '+(hor||'extrair')+'. OS: '+(os||'extrair')+'. Cliente: '+(cliente||'extrair')+'. Chassi: '+(chassi||'extrair')+'. Descricao: '+(texto||'ver imagem')+'.'+ctxPc+ctxHist+' IMPORTANTE: textos LONGOS e COMPLETOS. JSON sem markdown.';

        <span style="font-size:12px;color:var(--ts)">h</span>
      </div>`

    area.innerHTML=`<div class="resultado-ia" id="res-ia">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

        <div style="display:flex;gap:7px">

        <div><span style="color:var(--ts)">HORAS:</span> <b>${r.horas_uso||hor||'--'}</b></div>
        <div><span style="color:var(--ts)">PECA CHAVE:</span> <b style="font-family:var(--mono)">${r.peca_chave||peca||'--'}</b></div>
        <div><span style="color:var(--ts)">OS/CCMS:</span> <b>${r.os_ccms||os||'--'}</b></div>
      </div>
      <div class="sec-titulo">RECLAMACAO</div>

        ${tempoLinhas}

          <span>TOTAL</span><span id="total-horas" style="color:var(--g)">${r.horas_total||0}h</span>

      </div>
      ${r.observacoes?`<div class="sec-titulo" style="margin-top:12px">OBSERVACOES TECNICAS</div><textarea class="res-textarea" id="res-obs" oninput="window._res.observacoes=this.value" style="min-height:60px">${r.observacoes}</textarea>`:''}
      ${r.argumento_aprovacao?`<div style="margin-top:12px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:var(--r);padding:9px 12px"><div style="font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Argumento para aprovacao</div><div style="font-size:13px;color:var(--g2)">${r.argumento_aprovacao}</div></div>`:''}

function updTempo(el){
  if(!window._res||!window._res.tempo_detalhado)return;
  const i=parseInt(el.getAttribute('data-ti'));
  const f=el.getAttribute('data-field');
  window._res.tempo_detalhado[i][f]=f==='horas'?parseFloat(el.value)||0:el.value;
  const tot=window._res.tempo_detalhado.reduce((a,t)=>a+(+t.horas||0),0);
  window._res.horas_total=tot;
  const el2=document.getElementById('total-horas');if(el2)el2.textContent=tot+'h';
}

function copiarTexto(){
  const r=window._res;if(!r)return;
  const tempo=(r.tempo_detalhado||[]).map(t=>t.etapa.toUpperCase()+': '+t.horas+'H').join('\n');
  const txt=[
    'EQUIPAMENTO: '+(r.equipamento||r.modelo||'--'),
    'HORAS: '+(r.horas_uso||r.hor||'--'),
    'PECA CHAVE: '+(r.peca_chave||r.peca||'--'),
    'Nr OS / SOLICITACAO: '+(r.os_ccms||r.os||'--'),
    '',
    'RECLAMACAO:',
    r.reclamacao||'--',
    '',
    'FALHA (CAUSA RAIZ):',
    r.falha_causa||'--',
    '',
    'REPARO REALIZADO:',
    r.reparo||'--',
    '',
    'TEMPO DE TRABALHO:',
    tempo,
    'TOTAL: '+(r.horas_total||0)+'H',
    'ESTIMATIVA TECNICA - NAO REPRESENTA HORAS PAGAS PELA FABRICA.',
    '',
    'OBSERVACOES TECNICAS: '+(r.observacoes||'--'),
  ].join('\n');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=event.target.closest('button');
    if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i> Copiado!';setTimeout(()=>{btn.innerHTML=o;},2000);}
  });
}

function exportarExcel(){
  const d=ld();const cts=d.cortesias||[];
  if(!cts.length){alert('Nenhuma cortesia para exportar.');return;}
  // gerar CSV com BOM para Excel
  const bom='\uFEFF';
  const header='OS;Chassi;Cliente;Modelo;Peca Chave;Horas Aprovadas;Valor Pecas (Fabrica);Valor MO (Fabrica);MO Cliente;Rateio;Data Aprovacao;Aprovador Email';
  const rows=cts.map(c=>[
    c.os||'',c.chassi||'',c.cliente||'',c.modelo||'',c.peca||'',
    (c.horas_aprovadas||''),
    (c.val_pecas||'').toString().replace('.',','),
    (c.val_mo_fab||'').toString().replace('.',','),
    (c.val_mo_cli||'').toString().replace('.',','),
    c.rateio||'',D(c.data_aprovacao),c.email_envio||''
  ].join(';'));
  const csv=bom+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Cortesias_AgroBaggio_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
}

    d.cortesias=d.cortesias||[];

      // salvar tbm no historico de pecas
      if(s.pc){d.hp=d.hp||[];const jaH=d.hp.find(h=>h.os===s.os&&h.chassi===s.chassi);if(!jaH)d.hp.push({id:'hp'+Date.now(),codigo:s.pc,modelo:s.mdl||'',os:s.os,chassi:s.chassi,cliente:cl,horas_aprovadas:s.horas_total,falha:s.falha_causa||'',data_aprovacao:s.data_aprovacao});}

function resumirFalha(texto){
  if(!texto)return'';
  // Extrair o componente principal e o tipo de falha
  const t=texto.toUpperCase();
  // Mapeamento de componentes conhecidos
  const componentes=[
    ['TUBO DESCARREGADOR','Tubo descarregador'],['DESCARREGADOR','Descarregador'],
    ['ROLAMENTO','Rolamento'],['CORREIA','Correia'],['VARICOOL','Varicool'],
    ['MOTOR','Motor'],['HIDRAULICO','Hidraulico'],['TRANSMISSAO','Transmissao'],
    ['ALIMENTADOR','Alimentador'],['PENEIRA','Peneira'],['SENSOR','Sensor'],
    ['ATUADOR','Atuador'],['BOMBA','Bomba'],['CUBO DE RODA','Cubo de roda'],
    ['BALANCA','Balanca'],['ESPALHADOR','Espalhador'],['NAVALHA','Navalha'],
    ['CORREIA DO DESCARREGADOR','Correia do descarregador'],
    ['ROSCA HELICOIDAL','Rosca helicoidal'],['EIXO','Eixo'],
    ['GRANELEIRO','Graneleiro'],['ACUMULADOR','Acumulador'],
    ['PLANTADEIRA','Plantadeira'],['VALVULA','Valvula'],
    ['COMBUSTIVEL','Combustivel'],['CAMERA','Camera'],
    ['SISTEMA PRODRIVE','Sistema Prodrive'],
  ];
  const falhas=[
    ['EMBUCHAMENTO','embuchamento'],['TRAVAMENTO','travamento'],
    ['TRINCA','trinca prematura'],['VAZAMENTO','vazamento'],
    ['RUIDO','ruido anormal'],['DESGASTE','desgaste prematuro'],
    ['DESALINHAMENTO','desalinhamento'],['SOBRECARGA','sobrecarga'],
    ['FALHA INTERNA','falha interna'],['CODIGO DE ERRO','codigo de erro'],
    ['CODIGO DE FALHA','codigo de falha'],['RUPTURA','ruptura'],
    ['QUEBROU','quebrado'],['ROMPIMENTO','rompimento'],
    ['FOLGA','folga excessiva'],['NAO GIRA','sem rotacao'],
    ['INTERRUPCAO','interrupcao'],['DANO','dano prematuro'],
  ];
  let comp='',falha='';
  for(const [key,label] of componentes){if(t.includes(key)){comp=label;break;}}
  for(const [key,label] of falhas){if(t.includes(key)){falha=label;break;}}
  if(comp&&falha)return comp+' apresentando '+falha+'.';
  if(comp)return comp+': '+texto.substring(0,60)+(texto.length>60?'...':'');
  return texto.substring(0,70)+(texto.length>70?'...':'');
}

function autoPreenchGar(os){
  const d=ld();
  // buscar em sol e gp
  const s=(d.sol||[]).find(x=>x.os===os)||(d.gp||[]).find(x=>x.os===os);
  if(!s)return;
  const set=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
  set('ng-chassi',s.chassi);
  set('ng-peca',s.pc||s.peca);
  const cl=(d.eq||[]).find(e=>e.chassi===s.chassi);
  set('ng-cli',cl?cl.cliente:s.cliente||'');
  set('ng-mod',s.mdl||s.modelo||'');
  set('ng-rec',s.reclamacao||'');
  set('ng-falha',s.falha_causa||'');
  set('ng-rep',s.reparo||'');
  set('ng-hor',s.horas_total||s.horas_aprovadas||'');
  set('ng-vp',s.rp||s.val_pecas||'');
  set('ng-vmo',s.rs||s.val_mo_fab||'');

async function loadImpPDF(file){
  const prev=document.getElementById('imp-preview');
  const drop=document.getElementById('imp-drop');
  if(prev)prev.innerHTML='<div style="padding:12px;color:var(--g);display:flex;align-items:center;gap:8px"><i class="ti ti-loader spinning"></i> Convertendo PDF para imagem...</div>';

  // Funcao interna para carregar script
  function carregarScript(url){
    return new Promise(function(resolve,reject){
      if(document.querySelector('script[src="'+url+'"]')){resolve();return;}
      var s=document.createElement('script');
      s.src=url;
      s.onload=resolve;
      s.onerror=function(){reject(new Error('Falha ao carregar: '+url));};
      document.head.appendChild(s);
    });
  }

  try{
    // Carregar PDF.js
    await carregarScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    
    // Aguardar pdfjsLib estar disponivel
    var tentativas=0;
    while(!window.pdfjsLib&&tentativas<20){
      await new Promise(function(r){setTimeout(r,100);});
      tentativas++;
    }
    if(!window.pdfjsLib)throw new Error('PDF.js nao carregou. Verifique sua conexao com a internet.');
    
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Ler o arquivo como ArrayBuffer
    var arrayBuffer=await new Promise(function(resolve,reject){
      var fr=new FileReader();
      fr.onload=function(e){resolve(e.target.result);};
      fr.onerror=reject;
      fr.readAsArrayBuffer(file);
    });

    var pdfDoc=await window.pdfjsLib.getDocument({data:new Uint8Array(arrayBuffer)}).promise;
    var numPages=pdfDoc.numPages;
    var scale=2.0;
    var pageCanvases=[];
    var totalH=0;
    var maxW=0;

    // Renderizar cada pagina
    for(var i=1;i<=numPages;i++){
      var page=await pdfDoc.getPage(i);
      var vp=page.getViewport({scale:scale});
      var cv=document.createElement('canvas');
      cv.width=Math.floor(vp.width);
      cv.height=Math.floor(vp.height);
      var ctx2d=cv.getContext('2d');
      await page.render({canvasContext:ctx2d,viewport:vp}).promise;
      pageCanvases.push(cv);
      totalH+=cv.height+8;
      if(cv.width>maxW)maxW=cv.width;
    }

    // Juntar todas as paginas
    var final=document.createElement('canvas');
    final.width=maxW;
    final.height=totalH;
    var fctx=final.getContext('2d');
    fctx.fillStyle='#fff';
    fctx.fillRect(0,0,maxW,totalH);
    var yPos=0;
    for(var j=0;j<pageCanvases.length;j++){
      fctx.drawImage(pageCanvases[j],0,yPos);
      yPos+=pageCanvases[j].height+8;
    }

    var dataURL=final.toDataURL('image/jpeg',0.92);
    window._impImg=dataURL.split(',')[1];
    window._impMime='image/jpeg';
    window._impIsPDF=false;

    if(drop){drop.style.borderColor='var(--g)';drop.style.background='var(--gl)';}
    if(prev)prev.innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;background:var(--gl);border:1px solid #a5d6a7;border-radius:var(--r);padding:10px 14px;margin-top:8px">'
      +'<i class="ti ti-file-type-pdf" style="font-size:28px;color:#c62828"></i>'
      +'<div><div style="font-weight:600">'+file.name+'</div>'
      +'<div style="font-size:12px;color:var(--ts)">'+numPages+' pagina(s) convertida(s) - pronto para processar</div></div>'
      +'<i class="ti ti-check-circle" style="font-size:22px;color:var(--g);margin-left:auto"></i></div>'
      +'<img src="'+dataURL+'" style="max-width:100%;border-radius:var(--r);border:1px solid var(--bd);margin-top:8px;max-height:320px;object-fit:contain">';

  }catch(err){
    console.error('Erro PDF:', err);
    if(prev)prev.innerHTML=
      '<div style="color:#791f1f;padding:12px;background:#fce8e8;border-radius:var(--r);font-size:13px">'
      +'<b><i class="ti ti-alert-circle"></i> Erro ao processar PDF:</b> '+err.message
      +'<br><br>Tente: (1) tirar um print do PDF e colar com Ctrl+V, ou (2) usar "Imprimir > Salvar como PDF" para gerar novo PDF.</div>';
  }
}

    <p style="font-size:13px;margin-top:5px">Identificando OS, chassi, valores, pecas e textos da garantia...</p>
  </div>`;

  const sys=`Voce e um sistema de leitura de documentos de garantia John Deere. Extraia TODOS os dados visiveis no documento PDF de garantia e retorne um JSON completo.

Campos a extrair:
- concessionario, tipo_garantia, conta, localidade
- os1 (Ordem de Servico 1), os2, nr_garantia, status
- criado (data), envio_original, reapresentacao
- nr_nota_credito, data_emitida
- tipo_garantia_desc (ex: Garantia Basica), descricao_plano
- chassi (Nr de Serie), status_proprietario, uso_maquina (horas)
- cliente, data_entrega, data_inicio_basica, data_termino_basico
- data_falha, data_reparo, maquina_parada
- peca_causante (codigo), descricao_peca_causante

- pecas: array de [{codigo, descricao, qtd_sol, unidade_sol, valor_sol, qtd_apr, unidade_apr, valor_apr}]

- modalidade (NORMAL, PECAS ou CORTESIA - baseado no campo Tipo de Garantia)

CRITICO: Retorne SOMENTE o JSON puro. Sem markdown, sem backticks, sem texto antes ou depois. Primeira linha deve ser { e ultima }. Valores numericos como string. Campo vazio = string vazia.`;

  const instrEl=document.getElementById('imp-instrucoes');
  const instrucoes=instrEl&&instrEl.value.trim()?instrEl.value.trim():'Salvar tudo do arquivo exatamente como esta.';

  const usr=`Leia este documento de garantia John Deere e extraia os dados em JSON. Instrucoes: ${instrucoes}. Campos: nr_garantia, os1, os2, chassi, cliente, modelo, peca_causante, uso_maquina, data_falha, data_reparo, caso_dtac, reclamacao, diagnostico, reparacao, comentarios, horas_sol, horas_apr, val_mo_apr, val_pecas_apr, total_pecas, total_mo, total_geral, modalidade, motivo_reducao, pecas (array com codigo/descricao/qtd_sol/valor_sol/qtd_apr/valor_apr). Retorne JSON puro sem markdown.`;

  try{
    // Sempre envia como imagem (PDF ja foi convertido para imagem pelo PDF.js)
    const msgs=[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:window._impMime||'image/jpeg',data:window._impImg}},

    const resp=await callClaude({model:'claude-sonnet-4-20250514',max_tokens:3000,system:sys,messages:msgs});
    const data=await resp.json();
    if(!data||!data.content){

      area.innerHTML=`<div style="color:#791f1f;padding:12px;background:#fce8e8;border-radius:var(--r)"><b>Erro da API:</b> ${msg}<br><small>Verifique se a chave de API esta correta no Worker do Cloudflare.</small></div>`;

    let r={};

    // tentativa 2: extrair o primeiro { ... } do texto
    if(!parseOk){
      const m2=raw.match(/(\{[\s\S]*\})/);
      if(m2){try{r=JSON.parse(m2[1]);parseOk=true;}catch(e){}}
    }
    // tentativa 3: limpar e tentar direto
    if(!parseOk){
      try{r=JSON.parse(raw.trim());parseOk=true;}catch(e){}

function fmtDateISO(s){
  if(!s)return'';
  // Formato DD.MM.YYYY ou DD/MM/YYYY -> YYYY-MM-DD
  const m=s.match(/(\d{2})[./](\d{2})[./](\d{4})/);
  if(m)return`${m[3]}-${m[2]}-${m[1]}`;
  // Ja ISO
  if(/\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  return'';
}

function confirmarImportacao(){
  const r=window._impData||{};
  const d=ld();
  const os=document.getElementById('imp-os1').value.trim()||document.getElementById('imp-os2').value.trim();
  const chassi=document.getElementById('imp-chassi').value.trim().toUpperCase();
  const cliente=document.getElementById('imp-cliente').value.trim();
  const modelo=document.getElementById('imp-modelo').value.trim();
  const peca=document.getElementById('imp-peca').value.trim();
  const modalidade=document.getElementById('imp-mod').value;
  const hApr=parseFloat(document.getElementById('imp-mo-hapr').value)||0;
  const valMoApr=parseFloat(document.getElementById('imp-mo-vapr').value)||0;
  const tPec=parseFloat(document.getElementById('imp-tpec').value)||0;
  const tMo=parseFloat(document.getElementById('imp-tmo').value)||0;
  const tGeral=parseFloat(document.getElementById('imp-tgeral').value)||(tPec+tMo);
  const dFalha=document.getElementById('imp-dfalha').value;
  const dRep=document.getElementById('imp-drep').value;
  const dCri=document.getElementById('imp-dcri').value;
  const dtac=document.getElementById('imp-dtac').value;
  const reclamacao=document.getElementById('imp-rec').value;
  const diagnostico=document.getElementById('imp-diag').value;
  const reparacao=document.getElementById('imp-rep').value;
  const comEl=document.getElementById('imp-com');
  const comentario_fab=comEl?comEl.value:'';
  const uso=(document.getElementById('imp-uso').value||'').replace(/[^0-9.,]/g,'');
  const nrGar=document.getElementById('imp-nrgar').value;
  const hSol=parseFloat(document.getElementById('imp-mo-hsol').value)||0;
  const reducaoHoras=hSol>hApr;

  if(!os){alert('Nr OS nao encontrado. Verifique os campos.');return;}

  // 1. GARANTIA - sempre vai para d.garantias
  d.garantias=d.garantias||[];
  const jaGar=d.garantias.find(x=>x.os===os);
  const garObj={
    id: jaGar?jaGar.id:'gr'+Date.now(),
    os, nr_garantia:nrGar, chassi, cliente, modelo, peca,
    modalidade, uso_maquina:uso,
    data_falha:dFalha, data_reparo:dRep, data_criado:dCri,
    caso_dtac:dtac,
    reclamacao, falha_causa:diagnostico, reparo:reparacao,
    comentario_fabrica:comentario_fab,
    horas_sol:hSol, horas_aprovadas:hApr,
    reducao_horas:reducaoHoras,
    motivo_reducao:r.motivo_reducao||'',
    val_pecas:tPec, val_mo_fab:tMo, val_mo_cli:0,
    total_geral:tGeral,
    val_pecas_sol:parseFloat((document.getElementById('imp-mo-vsol')||{}).value)||0,
    aditivo_pecas:parseFloat(document.getElementById('imp-adic-pec').value)||0,
    aditivo_mo:parseFloat(document.getElementById('imp-adic-mo').value)||0,
    tempo_detalhado:[], horas_total:hApr,
    observacoes:'', status_garantia:r.status||'',
    data_aprovacao:dRep, rateio:'',
    pecas_importadas:r.pecas||[]
  };
  if(jaGar){Object.assign(jaGar,garObj);}
  else{d.garantias.push(garObj);}

  // 2. SOLICITACAO - cria/atualiza no chassi (para NORMAL e PECAS)
  if(chassi&&(modalidade==='NORMAL'||modalidade==='PECAS')){
    d.sol=d.sol||[];
    const jaSol=d.sol.find(s=>s.os===os&&s.chassi===chassi);
    const solObj={
      id:jaSol?jaSol.id:'s'+Date.now(),
      chassi, mdl:modelo, num:os, os, dtac,
      st:'Aprovado', dc:dCri, qu:uso,
      df:dFalha, dr:dRep,
      pc:peca, modalidade,
      reclamacao, falha_causa:diagnostico, reparo:reparacao,
      obs:'', tempo_detalhado:[], horas_total:hApr,
      r12p:tPec, r12s:tMo, rp:tPec, rs:tMo,
      mo_cliente:0, rateio:'',
      data_aprovacao:dRep, comentarios:[],
      nr_garantia:nrGar
    };
    if(jaSol){Object.assign(jaSol,solObj);}
    else{d.sol.push(solObj);}
  }

  // 3. EQUIPAMENTO - atualizar ou criar
  if(chassi){
    d.eq=d.eq||[];
    let eq=d.eq.find(x=>x.chassi===chassi);
    if(!eq){
      eq={chassi,modelo,hor:uso,cliente,cidade:'',estado:'MT',ent:'',tc:'',uso:'',status:'',jdlink:'',gars:[]};
      d.eq.push(eq);
    } else {
      if(uso)eq.hor=uso;
      if(cliente&&!eq.cliente)eq.cliente=cliente;
      if(modelo&&!eq.modelo)eq.modelo=modelo;
    }
  }

  // 4. HISTORICO DE PECAS - alimentar pcbase e hp
  if(peca&&peca!=='--'){
    d.hp=d.hp||[];
    const jaHp=d.hp.find(h=>h.os===os&&h.chassi===chassi);
    if(!jaHp){
      d.hp.push({id:'hp'+Date.now(),codigo:peca,modelo,os,chassi,cliente,horas_aprovadas:hApr,horas_solicitadas:hSol,falha:diagnostico,data_aprovacao:dRep,val_pecas:tPec,val_mo:tMo,reducao:reducaoHoras,motivo_reducao:r.motivo_reducao||''});
    }
    // Atualizar PCBASE se peca existir
    const pcIdx=PCBASE.findIndex(p=>p.c===peca);
    if(pcIdx>=0){
      // so atualizar horas tipicas se fizer sentido
    } else {
      // Adicionar ao PCBASE dinamicamente
      PCBASE.push({c:peca,m:modelo,h:String(hApr),rc:reclamacao,ca:diagnostico,rp:reparacao,obs:comentario_fab||''});
    }
  }

  sv(d);

  // Mostrar resultado
  const area=document.getElementById('imp-result');
  area.innerHTML=`<div style="background:var(--gl);border:2px solid var(--g);border-radius:var(--rl);padding:20px;text-align:center">
    <i class="ti ti-circle-check" style="font-size:42px;color:var(--g);display:block;margin:0 auto 10px"></i>
    <div style="font-size:17px;font-weight:600;color:var(--g);margin-bottom:10px">Importado com sucesso!</div>
    <div style="font-size:13px;color:var(--ts);margin-bottom:16px">Todos os dados foram distribuidos no sistema.</div>
    <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
      ${chassi?`<button class="btn btn-g" onclick="V.chassi='${chassi}';navTo('r')"><i class="ti ti-tractor"></i> Ver no Rastreamento</button>`:''}
      <button class="btn btn-o" onclick="V.garId='${garObj.id}';navTo('gar')"><i class="ti ti-shield-check"></i> Ver em Garantias</button>
      <button class="btn btn-o" onclick="limparImp()"><i class="ti ti-plus"></i> Importar outro PDF</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;text-align:left">
      <div style="background:#f8f8f4;border-radius:var(--r);padding:8px 10px;font-size:12px"><b style="color:var(--g)">Garantia</b><br>OS ${os} registrada</div>
      ${chassi?`<div style="background:#f8f8f4;border-radius:var(--r);padding:8px 10px;font-size:12px"><b style="color:var(--g)">Equipamento</b><br>${chassi}<br>${cliente}</div>`:''}
      ${peca?`<div style="background:#f8f8f4;border-radius:var(--r);padding:8px 10px;font-size:12px"><b style="color:var(--g)">Peca Chave</b><br>${peca}<br>${hApr}h aprovadas</div>`:''}
    </div>
    ${reducaoHoras?`<div style="background:#fff8e1;border:1px solid var(--yd);border-radius:var(--r);padding:10px 14px;margin-top:12px;font-size:13px;color:#7a5f00;text-align:left">
      <i class="ti ti-alert-triangle"></i> <b>Atencao:</b> Horas reduzidas de ${hSol}h para ${hApr}h.
      ${garObj.motivo_reducao?`<div style="margin-top:4px;font-style:italic">${garObj.motivo_reducao}</div>`:''}
      <div style="margin-top:6px">Esta reducao foi registrada no historico da peca para referencia futura.</div>
    </div>`:''}
  </div>`;
}
